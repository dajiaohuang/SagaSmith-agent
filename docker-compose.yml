services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dnd_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dnd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dnd_password}
      POSTGRES_DB: ${POSTGRES_DB:-dnd_dm}
    ports: ["5432:5432"]
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./backend/app/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dnd} -d ${POSTGRES_DB:-dnd_dm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: dnd_redis
    ports: ["6379:6379"]
    volumes: ["./volumes/redis:/data"]

  backend:
    build: ./backend
    container_name: dnd_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: [.env]
    ports: ["8000:8000"]
    gpus: all
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    container_name: dnd_worker
    depends_on:
      postgres:
        condition: service_healthy
    env_file: [.env]
    gpus: all
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
      - ${USERPROFILE}/.cache/huggingface:/root/.cache/huggingface
    command: python -m app.worker

  frontend:
    build: ./frontend
    container_name: dnd_frontend
    depends_on: [backend]
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports: ["3000:3000"]

  adminer:
    image: adminer
    container_name: dnd_adminer
    ports: ["8080:8080"]
